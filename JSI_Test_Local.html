<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JSI Hifz Pro - Local Test</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase Compat (Works on file://) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <style>
        /* Modern Design System - Embedded for Local Test */
        :root {
            --emerald: #065f46;
            --emerald-mid: #047857;
            --emerald-light: #10b981;
            --emerald-ultra: #ecfdf5;
            --slate-100: #f1f5f9;
            --slate-500: #64748b;
            --slate-900: #0f172a;
            --danger: #ef4444;
            --radius: 16px;
            --shadow: 0 4px 20px -5px rgba(0,0,0,0.1);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Plus+Jakarta+Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #f8fafc; color: var(--slate-900); overflow-x: hidden; min-height: 100vh; }

        /* Login Screen */
        .screen { display:none; min-height:100vh; width:100%; transition: opacity 0.3s; }
        .screen.active { display:flex; flex-direction:column; }
        
        #loginScreen {
            background: linear-gradient(160deg, #022c22 0%, #065f46 50%, #047857 100%);
            align-items: center; justify-content: center; padding: 2rem;
        }

        .login-card {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 24px;
            padding: 2.5rem 2rem; width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .login-logo { font-size: 2.5rem; font-weight: 800; color: white; margin-bottom: 0.5rem; letter-spacing: -1px; }
        .login-subtitle { color: rgba(255,255,255,0.7); font-size: 0.9rem; margin-bottom: 2rem; }
        
        .login-field {
            width: 100%; padding: 0.875rem 1.25rem; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1);
            color: white; font-size: 1rem; margin-bottom: 1rem; outline: none;
        }
        .login-field::placeholder { color: rgba(255,255,255,0.4); }

        .btn-primary {
            width: 100%; padding: 1rem; border-radius: 12px; border: none;
            background: white; color: var(--emerald); font-weight: 700;
            font-size: 1rem; cursor: pointer; transition: transform 0.2s;
        }
        .btn-primary:active { transform: scale(0.98); }

        .login-error { color: #fecaca; font-size: 0.8rem; margin-top: 1rem; height: 1rem; }

        /* Main Shell */
        #appShell { display:none; padding-bottom: 70px; }
        #appShell.active { display:block; }

        .top-bar {
            background: var(--emerald); color: white; padding: 1.25rem 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow);
        }
        .top-bar-title { font-weight: 800; font-size: 1.1rem; }

        .app-content { padding: 1rem; }

        /* Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 70px;
            background: white; border-top: 1px solid var(--slate-100);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: 5px; z-index: 1000;
        }
        .nav-item {
            flex: 1; border: none; background: none; display: flex;
            flex-direction: column; align-items: center; gap: 4px;
            color: var(--slate-500); font-size: 0.65rem; font-weight: 600;
        }
        .nav-item.active { color: var(--emerald); }

        /* Components */
        .dashboard-header { margin-bottom: 1.5rem; }
        .dash-greeting { font-size: 0.85rem; color: var(--slate-500); }
        .dash-name { font-size: 1.5rem; font-weight: 800; color: var(--slate-900); }

        .stat-card {
            background: white; padding: 1.25rem; border-radius: var(--radius);
            box-shadow: var(--shadow); margin-bottom: 1rem; border-left: 4px solid var(--emerald);
        }
        .stat-num { font-size: 1.75rem; font-weight: 800; color: var(--emerald); }
        .stat-lbl { font-size: 0.75rem; color: var(--slate-500); font-weight: 600; text-transform: uppercase; }

        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--slate-900); color: white; padding: 0.75rem 1.5rem;
            border-radius: 999px; font-size: 0.85rem; z-index: 2000;
            display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .spinner {
            width: 24px; height: 24px; border: 3px solid rgba(0,0,0,0.1);
            border-top-color: var(--emerald); border-radius: 50%;
            animation: spin 1s infinite linear;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="loginScreen" class="screen active">
        <div class="login-card">
            <div class="login-logo">JSI</div>
            <div class="login-subtitle">Hifz Pro — Local Test Edition</div>
            <input type="email" class="login-field" id="loginEmail" placeholder="Email (admin@jsi.com)">
            <input type="password" class="login-field" id="loginPassword" placeholder="Password (admin123)">
            <button class="btn-primary" id="loginBtn">Sign In</button>
            <div class="login-error" id="loginError"></div>
        </div>
    </div>

    <!-- App Shell -->
    <div id="appShell">
        <div class="top-bar">
            <div>
                <div class="top-bar-title" id="userNameDis">Welcome</div>
                <div style="font-size:0.7rem; opacity:0.8" id="roleDis">Dashboard</div>
            </div>
            <button onclick="doLogout()" style="background:none; border:none; color:white; font-size:1.2rem">🚪</button>
        </div>
        
        <div class="app-content">
            <div id="dashboardView">
                <div class="dashboard-header">
                    <div class="dash-greeting">Today is</div>
                    <div class="dash-name" id="todayLabel">Monday...</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" id="sCount">0</div>
                    <div class="stat-lbl">Active Students</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" id="eCount">0</div>
                    <div class="stat-lbl">Entries Today</div>
                </div>
                <div style="padding:1rem; text-align:center; color:var(--slate-500); font-size:0.8rem">
                    Testing Mode Ready • Firebase Auth Connected
                </div>
            </div>
            <!-- Other views would go here -->
        </div>

        <nav class="bottom-nav">
            <button class="nav-item active"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dash</button>
            <button class="nav-item"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Students</button>
            <button class="nav-item" id="adminBtn" style="display:none"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>Admin</button>
        </nav>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Config
        const firebaseConfig = {
            apiKey: "AIzaSyA07w95cgeuO06DKujPa-_ISrmIVnd6E8Y",
            authDomain: "jsi-hifz-pro.firebaseapp.com",
            projectId: "jsi-hifz-pro",
            storageBucket: "jsi-hifz-pro.firebasestorage.app",
            messagingSenderId: "317578684336",
            appId: "1:317578684336:web:ede42b6feb17903a395875"
        };

        // Init
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const loginScreen = document.getElementById('loginScreen');
        const appShell = document.getElementById('appShell');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');

        // Logic
        loginBtn.onclick = async () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            loginError.textContent = "";
            loginBtn.textContent = "Checking...";
            loginBtn.disabled = true;

            try {
                const cred = await auth.signInWithEmailAndPassword(email, pass);
                const userDoc = await db.collection('users').doc(cred.user.uid).get();
                if (userDoc.exists) {
                    const profile = userDoc.data();
                    if (profile.approved) {
                        enterApp(profile);
                    } else {
                        throw new Error("Account pending approval.");
                    }
                } else {
                    throw new Error("Profile not found in database.");
                }
            } catch (err) {
                loginError.textContent = err.message;
                loginBtn.textContent = "Sign In";
                loginBtn.disabled = false;
            }
        };

        function enterApp(user) {
            loginScreen.classList.remove('active');
            appShell.classList.add('active');
            document.getElementById('userNameDis').textContent = user.name;
            document.getElementById('roleDis').textContent = user.role.toUpperCase();
            document.getElementById('todayLabel').textContent = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
            
            if (['owner', 'admin', 'management'].includes(user.role)) {
                document.getElementById('adminBtn').style.display = 'flex';
            }
            showToast("Welcome to JSI Hifz Pro");
            loadStats();
        }

        async function loadStats() {
            const sSnap = await db.collection('students').get();
            document.getElementById('sCount').textContent = sSnap.size;
            
            const eSnap = await db.collection('entries').where('date', '==', new Date().toISOString().split('T')[0]).get();
            document.getElementById('eCount').textContent = eSnap.size;
        }

        function doLogout() {
            auth.signOut();
            appShell.classList.remove('active');
            loginScreen.classList.add('active');
            loginBtn.textContent = "Sign In";
            loginBtn.disabled = false;
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.textContent = m;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        // Persistence
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const doc = await db.collection('users').doc(user.uid).get();
                if (doc.exists) enterApp(doc.data());
            }
        });
    </script>
</body>
</html>
