<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JSI Hifz Pro</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Firebase (Must be first as a module) -->
    <script type="module" src="js/firebase-config.js"></script>
    
    <!-- App Logic -->
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/app.js"></script>
</head>
<body>

    <!-- Login Screen -->
    <div id="loginScreen" class="screen active">
        <div class="login-card">
            <div class="login-logo-container">
                <img src="assets/logo.png" alt="JSI Hifz Pro Logo" style="width: 120px; height: auto; margin-bottom: 1rem; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2);">
            </div>
            <div class="login-subtitle">Jamia Swahaba Al-Islamia</div>
            <div class="login-tagline">✧ Hifz Pro — Cloud Edition ✧</div>
            <div id="loginForm">
                <div class="form-group" style="text-align: left; margin-bottom: 1rem;">
                    <label class="form-label" style="color: rgba(255,255,255,0.7)">Email Address</label>
                    <input type="email" class="login-field" id="loginEmail" placeholder="name@school.com" autocomplete="email">
                </div>
                <div class="form-group" style="text-align: left; margin-bottom: 1.5rem;">
                    <label class="form-label" style="color: rgba(255,255,255,0.7)">Password</label>
                    <input type="password" class="login-field" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
                </div>
            </div>
            <button class="btn-primary" id="signInBtn">Sign In</button>
            <div class="login-error" id="loginError"></div>
        </div>
    </div>

    <!-- Main App Shell -->
    <div id="appShell">
        <div class="top-bar">
            <div>
                <div class="top-bar-title" id="topBarTitle">JSI Hifz Pro</div>
                <div class="top-bar-sub" id="topBarSub">Dashboard</div>
            </div>
            <div class="top-bar-right">
                <button class="icon-btn" onclick="showLogoutConfirm()" title="Logout" style="color:white;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);font-size:1.1rem">🚪</button>
            </div>
        </div>
        
        <div class="app-content" id="appContent"></div>
        
        <nav class="bottom-nav">
            <button class="nav-item active" id="nav-dashboard" onclick="navigate('dashboard')">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                Dashboard
            </button>
            <button class="nav-item" id="nav-students" onclick="navigate('students')">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                Students
            </button>
            <button class="nav-item" id="nav-enroll" onclick="navigate('enroll')">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Enroll
            </button>
            <button class="nav-item" id="nav-reports" onclick="navigate('reports')">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                Reports
            </button>
            <button class="nav-item" id="adminNavBtn" onclick="navigate('admin')">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
                Admin
            </button>
        </nav>
    </div>

    <!-- UI Elements -->
    <div class="toast" id="toast"></div>
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent"></div>
    </div>

</body>
</html>
