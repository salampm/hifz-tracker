<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JSI Hifz Pro</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Firebase (Must be first as a module) -->
    <script type="module" src="js/firebase-config.js"></script>
    
    <!-- App Logic -->
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/app.js"></script>
</head>
<body>

    <!-- Login Screen -->
    <div id="loginScreen" class="screen active">
        <div class="login-card">
            <div class="login-logo-container">
                <img src="assets/logo_dark.png" alt="JSI Hifz Pro Logo" style="width: 140px; height: auto; margin-bottom: 0.5rem;">
            </div>
            <div class="login-subtitle">Jamia Swahaba Al-Islamia</div>
            <div class="login-tagline">✧ Hifz Pro — Cloud Edition ✧</div>
            <div id="loginForm">
                <div class="form-group" style="text-align: left; margin-bottom: 1rem;">
                    <label class="form-label" style="color: rgba(255,255,255,0.7)">Email Address</label>
                    <input type="email" class="login-field" id="loginEmail" placeholder="name@school.com" autocomplete="email">
                </div>
                <div class="form-group" style="text-align: left; margin-bottom: 1.5rem;">
                    <label class="form-label" style="color: rgba(255,255,255,0.7)">Password</label>
                    <input type="password" class="login-field" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
                </div>
            </div>
            <button class="btn-primary" id="signInBtn">Sign In</button>
            <div style="margin-top:1.5rem;display:flex;justify-content:space-between;font-size:0.75rem">
                <a href="#" style="color:var(--primary);text-decoration:none" onclick="handleForgotPassword()">Forgot Password?</a>
                <a href="#" style="color:rgba(255,255,255,0.6);text-decoration:none" onclick="showModal('<div class=\'modal-title\'>Request Admission</div><div class=\'empty-state-text\'>Please contact the Jamia Swahaba office at <b>04998208333</b> for new admissions and login requests.</div>')">Request Access</a>
            </div>
            <div class="login-error" id="loginError"></div>
        </div>
    </div>

    <!-- Main App Shell -->
    <div id="appShell">
        <div class="top-bar">
            <div>
                <div class="top-bar-title" id="topBarTitle">JSI Hifz Pro</div>
                <div class="top-bar-sub" id="topBarSub">Dashboard</div>
            </div>
            <div class="top-bar-right">
                <button class="icon-btn" onclick="showLogoutConfirm()" title="Logout" style="color:white;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);font-size:1.1rem">🚪</button>
            </div>
        </div>
        
        <div class="app-content" id="appContent"></div>
        
        <nav class="bottom-nav">
            <button class="nav-item active" id="nav-dashboard" onclick="navigate('dashboard')">
                <span class="nav-icon">⊞</span>
                <span class="nav-text">Dashboard</span>
            </button>
            <button class="nav-item" id="nav-students" onclick="navigate('students')">
                <span class="nav-icon">👤</span>
                <span class="nav-text">Students</span>
            </button>
            <button class="nav-item" id="nav-diary" onclick="navigate('diary')">
                <span class="nav-icon">📖</span>
                <span class="nav-text">Diary</span>
            </button>
            <button class="nav-item" id="nav-enroll" onclick="navigate('enroll')">
                <span class="nav-icon">＋</span>
                <span class="nav-text">Enroll</span>
            </button>
            <button class="nav-item" id="nav-reports" onclick="navigate('reports')">
                <span class="nav-icon">📄</span>
                <span class="nav-text">Reports</span>
            </button>
            <button class="nav-item" id="adminNavBtn" style="display:none" onclick="navigate('admin')">
                <span class="nav-icon">👤</span>
                <span class="nav-text">Admin</span>
            </button>
        </nav>
    </div>

    <!-- UI Elements -->
    <div class="toast" id="toast"></div>
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent"></div>
    </div>

</body>
</html>
